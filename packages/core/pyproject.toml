[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agena-core"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "SQLAlchemy>=2.0",
    "pydantic>=2.11",
    "pydantic-settings>=2.11",
    "python-jose>=3.5",
    "passlib[bcrypt]>=1.7",
    "httpx>=0.28",
    "python-dotenv>=1.1",
    "PyYAML>=6.0",
    "aiomysql>=0.2",
    "pymysql>=1.1",
    "redis>=5.2",
    "sentry-sdk[fastapi]>=2.20",
    # Pin cryptography below 47 — 47.0.0 ARM64 wheel ships an instruction
    # the linuxkit/aarch64 Docker VM doesn't support, crashing the API
    # boot with SIGILL ("Illegal instruction"). 45.x and 46.x are fine.
    # crewai → pdfplumber → pdfminer.six pulls cryptography transitively
    # without an upper bound, so we cap it here in core (installed first).
    "cryptography>=42,<47",
]

[tool.setuptools.packages.find]
where = ["src"]
